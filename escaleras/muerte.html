<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muerte</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="scene-body" data-tags="escaleras">
  <main class="scene-wrap text-outline">
    <p id="m-dot-1" class="hidden fade-line">.</p>
    <p id="m-dot-2" class="hidden fade-line">.</p>
    <p id="m-dot-3" class="hidden fade-line">.</p>

    <div id="m-choices" class="hidden fade-line">
      <p><a href="lahostia.html" class="choice-link">¿Qué ha pasado?</a></p>
      <p><a href="el.html" class="choice-link">¿Qué has hecho?</a></p>
    </div>
  </main>

  <button id="inventory-toggle" class="inventory-toggle" type="button" aria-expanded="false">
    Inventario
  </button>

  <aside id="inventory-panel" class="inventory-panel" aria-hidden="true">
    <div class="inventory-header">
      <h2>Inventario</h2>
      <button id="inventory-close" class="inventory-close" type="button" aria-label="Cerrar inventario">✕</button>
    </div>

    <div class="inventory-tabs" role="tablist" aria-label="Categorías del inventario">
      <button class="inventory-tab active" data-category="objeto" role="tab" aria-selected="true">Objetos</button>
      <button class="inventory-tab" data-category="persona" role="tab" aria-selected="false">Personas</button>
      <button class="inventory-tab" data-category="ruta" role="tab" aria-selected="false">Rutas</button>
    </div>

    <div class="inventory-layout">
      <ul id="inventory-list" class="inventory-list" aria-label="Elementos del inventario"></ul>
      <article class="inventory-detail">
        <div class="detail-art" id="item-art">?</div>
        <p id="item-badge" class="item-badge">Categoría</p>
        <h3 id="item-title">Selecciona un elemento</h3>
        <p id="item-stars" class="item-stars">☆☆☆☆☆</p>
        <p id="item-text">Aquí aparecerá la descripción.</p>
      </article>
    </div>
  </aside>

  <script src="../javascript/inventory.js"></script>
  <script src="../javascript/muerte.js"></script>
  <script src="./javascript/investigation-layer.js"></script>

</body>
</html>
